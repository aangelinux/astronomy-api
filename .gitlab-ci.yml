stages:
  - test

postman_tests:
  stage: test
  image: node:18
  before_script: 
    - npm install -g newman
  script:
    - newman run postman/astronomy.json \
      -e postman/astronomyGraphQLAPI.json \
      --reporters cli,junit \
      --reporter-junit-export results.xml
  artifacts:
    when: always
    reports:
      junit: results.xml