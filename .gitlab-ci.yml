stages:
  - test

test_job:
  stage: test
  image: node:18
  script:
    - echo "CI working"
    - node --version
    - npm --version

postman_tests:
  stage: test
  image: node:18
  before_script: 
    - npm install -g newman newman-reporter-junitfull
  script:
    - npm run seed
    - newman run "https://api.getpostman.com/collections/$POSTMAN_COLLECTION_ID?apikey=$POSTMAN_API_KEY" \
      --environment "https://api.getpostman.com/environments/$POSTMAN_ENV_ID?apikey=$POSTMAN_API_KEY" \
      --reporters cli,junit \
      --reporter-junit-export newman-report.xml
  artifacts:
    when: always
    paths: 
      - newman-report.xml
    reports:
      - junit: newman-report.xml