stages:
  - lint
  - test

lint:
  stage: lint
  image: node:18
  script: 
    - npm ci
    - npm run lint

postman_tests:
  stage: test
  image: node:18
  before_script: 
    - npm ci
    - npm install -g newman newman-reporter-junitfull
  script:
    - npm run seed
    - npm start &
    - newman run "./postman/astronomy_postman_collection.json"
      --environment "./postman/astronomy_postman_environment.json" \
      --reporters cli,junit \
      --reporter-junit-export newman-report.xml
  artifacts:
    when: always
    paths: 
      - newman-report.xml
    reports:
      junit: newman-report.xml