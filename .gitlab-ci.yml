stages:
  - lint
  - test

lint:
  stage: lint
  image: node:18
  script: 
    - npm ci
    - npm run lint

tests:
  stage: test
  image: node:20
  services:
    - name: mysql:8
      alias: mysql
  variables:
    MYSQLHOST: mysql
    MYSQLPORT: 3306
    MYSQL_ROOT_PASSWORD: $MYSQLPASSWORD
    MYSQLDATABASE: astronomy_api
  before_script: 
    - npm ci
    - npm install -g newman newman-reporter-junitfull newman-reporter-htmlextra
  script:
    - sleep 20
    - npm run seed
    - npm start &
    - newman run "./postman/astronomy_postman_collection.json" --environment "./postman/astronomy_postman_environment.json" --reporters cli,junit,htmlextra --reporter-junit-export newman-report.xml --reporter-htmlextra-export newman-report.html
  artifacts:
    when: always
    paths: 
      - newman-report.xml
      - newman-report.html
    reports:
      junit: newman-report.xml