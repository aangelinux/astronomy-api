$kind: graphql-request
name: Get multiple Orbits
url: "{{URL}}"
query: |
  query Orbits {
      orbits(page: {{page}}) {
          spkid
          orbital_class
          eccentricity
          years
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const orbits = jsonResponse.orbits\r

      \r

      pm.test(\"Returns 50 orbits\", () => {\r

      \    pm.expect(orbits.length).to.eql(50)\r

      })\r

      \r

      pm.test(\"Returns valid Orbit objects\", () => {\r

      \    pm.expect(orbits[0]).to.be.an(\"object\")\r

      \    pm.expect(orbits[0]).to.have.property(\"spkid\")\r

      \    pm.expect(orbits[0].spkid).to.be.a(\"string\")\r

      })"
    language: text/javascript
order: 3564397893374976
