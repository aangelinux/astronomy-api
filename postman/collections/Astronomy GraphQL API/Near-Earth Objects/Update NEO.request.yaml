$kind: graphql-request
name: Update NEO
url: "{{URL}}"
query: |
  mutation UpdateNeo {
      updateNeo(
          spkid: "98"
          input: { name: "postman_update" }
          token: {{token}}
      ) {
          spkid
          name
          earth_moid_ld
          magnitude
          rotation_hours
          pot_hazardous_asteroid
      }
  }
variables: ""
schema:
  source: auto
order: 4498619119033333
