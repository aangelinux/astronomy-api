$kind: collection
id: b01cfAFfdCdc51E98ab2b9Db
name: Astronomy Tests
variables:
  success: ""
  errors: ""
  isObject: ""
  isAstronomicalObject: ""
  returnsMultipleObjects: ""
  hasSpkid: ""
  returnsMessage: ""
  returnsErrorMessage: ""
  status: ""
  isErrorObject: ""
  graphqlErrors: ""
scripts:
  - type: graphql:afterResponse
    code: "pm.test(\"Data exists\", () => {\r

      \    pm.expect(pm.response).to.have.property(\"data\");\r

      \    pm.expect(pm.response.data).to.not.be.null;\r

      });\r

      \r

      pm.test(\"Response time under 2000ms\", () => {\r

      \    pm.expect(pm.response.responseTime).to.be.below(2000);\r

      });"
  - type: graphql:beforeQuery
    code: "pm.collectionVariables.set(\"status\",\r

      \    `function hasStatus(code) {\r

      \        pm.test(\"Returns correct status code\", () => {\r

      \            pm.response.to.have.status(code);\r

      \        });\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"success\",\r

      \    `function success() {\r

      \        pm.test(\"No GraphQL errors\", () => {\r

      \            pm.expect(pm.response.errors).to.be.an(\"undefined\");\r

      \        });\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"errors\",\r

      \    `function errors() {\r

      \        pm.test(\"Contains GraphQL errors\", () => {\r

      \            pm.expect(pm.response.errors).to.not.be.empty;\r

      \        });\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"isObject\",\r

      \    `function isObject(type) {\r

      \        pm.test(\"Returns an object\", () => {\r

      \            pm.expect(type).to.not.be.null\r

      \            pm.expect(type).to.be.an(\"object\")\r

      \        })\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"isAstronomicalObject\",\r

      \    `function isAstronomicalObject(type) {\r

      \        pm.test(\"Returns an astronomical object\", () => {\r

      \            pm.expect(type[0]).to.be.an(\"object\")\r

      \            pm.expect(type[0]).to.have.property(\"spkid\")\r

      \            pm.expect(type[0].spkid).to.be.a(\"string\")\r

      \        })\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"returnsMultipleObjects\", \r

      \    `function returnsMultipleObjects(objects) {  \r

      \        pm.test(\"Returns 50 objects\", () => {\r

      \            const limit = 50;\r

      \            pm.expect(objects.length).to.eql(limit)\r

      \        })\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"hasSpkid\", \r

      \    `function hasSpkid(object) {\r

      \        pm.test(\"Object contains valid spkid\", () => {\r

      \            pm.expect(object).to.have.property(\"spkid\")\r

      \            pm.expect(object.spkid).to.be.a(\"string\")\r

      \        })\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"returnsMessage\", \r

      \    `function returnsMessage(object, text) {\r

      \        pm.test(\"Returns message\", () => {\r

      \            pm.expect(object).to.have.property(\"message\")\r

      \            pm.expect(object.message).to.equal(text)\r

      \        })\r

      \    }`\r

      )\r

      \r

      pm.collectionVariables.set(\"returnsErrorMessage\",\r

      \    `function returnsErrorMessage(text) {\r

      \        pm.test(\"Returns error message\", () => {\r

      \            pm.expect(pm.response.errors).to.not.be.empty;\r

      \            pm.expect(pm.response.errors[0].message).to.contain(text)\r

      \        })\r

      \    }`\r

      )"
