$kind: graphql-request
name: Get Approach - Invalid Params
url: "{{URL}}"
query: |
  query Close_approach {
      close_approach(id: "1") {
          id
          spkid
          date
          nominal_distance_km
          minimum_distance_km
          relative_velocity_km_s
          rarity
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const approach = jsonResponse.close_approach\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"isObject\"))\r

      eval(pm.collectionVariables.get(\"hasSpkid\"))\r

      \r

      hasStatus(200)\r

      success()\r

      isObject(approach)\r

      hasSpkid(approach)\r

      \r

      pm.test(\"Object contains valid date\", () => {\r

      \    pm.expect(approach).to.have.property(\"date\")\r

      \    pm.expect(approach.date).to.be.a(\"string\")\r

      })\r

      \r

      pm.test(\"Object contains valid nominal_distance_km\", () => {\r

      \    pm.expect(approach).to.have.property(\"nominal_distance_km\")\r

      \    pm.expect(approach.nominal_distance_km).to.be.a(\"number\")\r

      })"
    language: text/javascript
order: 634263100761665
