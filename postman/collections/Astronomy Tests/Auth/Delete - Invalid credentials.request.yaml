$kind: graphql-request
name: Delete - Invalid credentials
url: "{{URL}}"
query: |
  mutation DeleteAccount {
      deleteAccount(input: { 
          username: {{username}}, 
          password: "null" 
      }) 
      {
          message
          deletedUser {
              userid
              username
              created
          }
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"errors\"))\r

      eval(pm.collectionVariables.get(\"returnsErrorMessage\"))\r

      \r

      hasStatus(200)\r

      errors()\r

      returnsErrorMessage(\"Username or password invalid\")"
    language: text/javascript
order: 4503589049463550
