$kind: graphql-request
name: Delete User - Success
url: "{{URL}}"
query: |
  mutation DeleteAccount {
      deleteAccount(input: { username: {{username}}, password: {{password}} }) {
          message
          deletedUser {
              userid
              username
              created
          }
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const deleted = jsonResponse.deleteAccount\r

      \r

      pm.test(\"Returns deleted user\", () => {\r

      \    pm.expect(deleted).to.have.property(\"deletedUser\")\r

      \    pm.expect(deleted.deletedUser).to.be.an(\"object\")  \r

      })\r

      \r

      pm.test(\"Returns success message\", () => {\r

      \    pm.expect(deleted).to.have.property(\"message\")\r

      \    pm.expect(deleted.message).to.equal(\"Account deleted
      successfully\")\r

      })"
    language: text/javascript
order: 4479236422120212
