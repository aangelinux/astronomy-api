$kind: graphql-request
name: Login - Invalid credentials
url: "{{URL}}"
query: |
  mutation Login {
      login(input: { 
          username: {{username}}, 
          password: "null" 
      }) 
      {
          token
          message
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"errors\"))\r

      eval(pm.collectionVariables.get(\"returnsErrorMessage\"))\r

      \r

      hasStatus(200)\r

      errors()\r

      returnsErrorMessage(\"Username or password invalid\")"
    language: text/javascript
order: 3504422196200286
