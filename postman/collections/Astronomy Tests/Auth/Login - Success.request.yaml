$kind: graphql-request
name: Login - Success
url: "{{URL}}"
query: |
  mutation Login {
      login(input: { username: {{username}}, password: {{password}} }) {
          token
          message
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const login = jsonResponse.login\r

      \r

      pm.test(\"Returns JWT token\", () => {\r

      \    pm.expect(login).to.have.property(\"token\")\r

      \    pm.expect(login.token).to.be.a(\"string\")\r

      })\r

      \r

      pm.test(\"Returns success message\", () => {\r

      \    pm.expect(login).to.have.property(\"message\")\r

      \    pm.expect(login.message).to.equal(\"Login successful\")\r

      })"
    language: text/javascript
order: 2102479740235733
