$kind: graphql-request
name: Register - Success
url: "{{URL}}"
query: |
  mutation Register {
      register(input: { 
          username: {{username}}, 
          password: {{password}} 
      }) 
      {
          userid
          username
          created
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const user = jsonResponse.register\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"isObject\"))\r

      \r

      hasStatus(200)\r

      success()\r

      isObject(user)\r

      \r

      pm.test(\"Object contains valid userid\", () => {\r

      \    pm.expect(user).to.have.property(\"userid\")\r

      \    pm.expect(user.userid).to.be.a(\"string\")\r

      })\r

      \r

      pm.test(\"Object contains valid username\", () => {\r

      \    pm.expect(user).to.have.property(\"username\")\r

      \    pm.expect(user.username).to.be.a(\"string\")\r

      })\r

      \r

      pm.test(\"Object contains valid created date\", () => {\r

      \    pm.expect(user).to.have.property(\"created\")\r

      \    pm.expect(user.created).to.be.a(\"string\")\r

      })"
    language: text/javascript
order: 1772459327527
