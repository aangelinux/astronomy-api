$kind: graphql-request
name: Add NEO - Missing auth
url: "{{URL}}"
query: |
  mutation AddNeo {
      addNeo(
          input: { 
              spkid: {{mutate_spkid}}, 
              name: "test", 
              earth_moid_ld: 1.1 
          }
          token: null
      ) {
          spkid
          name
          earth_moid_ld
          magnitude
          rotation_hours
          pot_hazardous_asteroid
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"errors\"))\r

      eval(pm.collectionVariables.get(\"returnsErrorMessage\"))\r

      \r

      hasStatus(400)\r

      errors()\r

      returnsErrorMessage(\"Expected value of type \\\"String!\\\", found
      null.\")"
    language: text/javascript
