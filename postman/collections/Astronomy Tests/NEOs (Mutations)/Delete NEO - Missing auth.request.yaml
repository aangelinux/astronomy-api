$kind: graphql-request
name: Delete NEO - Missing auth
url: "{{URL}}"
query: |
  mutation DeleteNeo {
      deleteNeo(
          spkid: {{mutate_spkid}}
          token: null
      ) {
          message
          deletedNeo {
              spkid
              name
              earth_moid_ld
              magnitude
              rotation_hours
              pot_hazardous_asteroid
          }
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"errors\"))\r

      eval(pm.collectionVariables.get(\"returnsErrorMessage\"))\r

      \r

      hasStatus(400)\r

      errors()\r

      returnsErrorMessage(\"Expected value of type \\\"String!\\\", found
      null.\")"
    language: text/javascript
order: 4062344719632441
