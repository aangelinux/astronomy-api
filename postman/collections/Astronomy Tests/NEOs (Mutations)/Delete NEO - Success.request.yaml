$kind: graphql-request
name: Delete NEO - Success
url: "{{URL}}"
query: |
  mutation DeleteNeo {
      deleteNeo(
          spkid: {{mutate_spkid}}
          token: {{token}}
      ) {
          message
          deletedNeo {
              spkid
              name
              earth_moid_ld
              magnitude
              rotation_hours
              pot_hazardous_asteroid
          }
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const deleted = jsonResponse.deleteNeo\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"returnsMessage\"))\r

      \r

      hasStatus(200)\r

      success()\r

      returnsMessage(deleted, \"Near-Earth Object deleted successfully\")\r

      \r

      pm.test(\"Returns deleted NEO\", () => {\r

      \    pm.expect(deleted).to.have.property(\"deletedNeo\")\r

      \    pm.expect(deleted.deletedNeo).to.be.an(\"object\")  \r

      })"
    language: text/javascript
order: 2991850601311862
