$kind: graphql-request
name: Update NEO - Missing auth
url: "{{URL}}"
query: |
  mutation UpdateNeo {
      updateNeo(
          spkid: {{mutate_spkid}}
          input: { 
              name: "update" 
          }
          token: {{token}}
      ) {
          spkid
          name
          earth_moid_ld
          magnitude
          rotation_hours
          pot_hazardous_asteroid
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const neo = jsonResponse.updateNeo\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"isObject\"))\r

      eval(pm.collectionVariables.get(\"hasSpkid\"))\r

      \r

      hasStatus(200)\r

      success()\r

      isObject(neo)\r

      hasSpkid(neo)\r

      \r

      pm.test(\"Input values have been updated\", () => {\r

      \    pm.expect(neo).to.have.property(\"name\")\r

      \    pm.expect(neo.name).to.equal(\"update\")\r

      })"
    language: text/javascript
order: 2293478673017031
