$kind: graphql-request
name: Get NEO - Success
url: "{{URL}}"
query: "query Neo {\r

  \  neo(spkid: {{query_spkid}}) {\r

  \    spkid\r

  \    name\r

  \    earth_moid_ld\r

  \    magnitude\r

  \    pot_hazardous_asteroid\r

  \    rotation_hours\r

  \  }\r

  }"
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const neo = jsonResponse.neo\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"isObject\"))\r

      eval(pm.collectionVariables.get(\"hasSpkid\"))\r

      \r

      hasStatus(200)\r

      success()\r

      isObject(neo)\r

      hasSpkid(neo)\r

      \r

      pm.test(\"Object contains valid name\", () => {\r

      \    pm.expect(neo).to.have.property(\"name\")\r

      \    pm.expect(neo.name).to.be.a(\"string\")\r

      })\r

      \r

      pm.test(\"Object contains valid earth_moid_ld\", () => {\r

      \    pm.expect(neo).to.have.property(\"earth_moid_ld\")\r

      \    pm.expect(neo.earth_moid_ld).to.be.a(\"number\")\r

      })"
    language: text/javascript
order: 1772460975996
