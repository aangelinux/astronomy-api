$kind: graphql-request
name: Get multiple - Success
url: "{{URL}}"
query: |
  query Neos {
      neos(page: {{page}}) {
          spkid
          name
          earth_moid_ld
          magnitude
          rotation_hours
          pot_hazardous_asteroid
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const neos = jsonResponse.neos\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"returnsMultipleObjects\"))\r

      eval(pm.collectionVariables.get(\"isAstronomicalObject\"))\r

      \r

      hasStatus(200)\r

      success()\r

      returnsMultipleObjects(neos)\r

      isAstronomicalObject(neos)"
    language: text/javascript
order: 4462285610945275
