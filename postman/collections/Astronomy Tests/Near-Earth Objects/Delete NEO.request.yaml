$kind: graphql-request
name: Delete NEO
url: "{{URL}}"
query: |
  mutation DeleteNeo {
      deleteNeo(
          spkid: {{mutate_spkid}}
          token: {{token}}
      ) {
          message
          deletedNeo {
              spkid
              name
              earth_moid_ld
              magnitude
              rotation_hours
              pot_hazardous_asteroid
          }
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const deleted = jsonResponse.deleteNeo\r

      \r

      pm.test(\"Returns deleted NEO\", () => {\r

      \    pm.expect(deleted).to.have.property(\"deletedNeo\")\r

      \    pm.expect(deleted.deletedNeo).to.be.an(\"object\")  \r

      })\r

      \r

      pm.test(\"Returns success message\", () => {\r

      \    pm.expect(deleted).to.have.property(\"message\")\r

      \    pm.expect(deleted.message).to.equal(\"Near-Earth Object deleted
      successfully\")\r

      })"
    language: text/javascript
order: 4503392020251488
