$kind: graphql-request
name: Update NEO
url: "{{URL}}"
query: |
  mutation UpdateNeo {
      updateNeo(
          spkid: {{mutate_spkid}}
          input: { 
              name: "update" 
          }
          token: {{token}}
      ) {
          spkid
          name
          earth_moid_ld
          magnitude
          rotation_hours
          pot_hazardous_asteroid
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const neo = jsonResponse.updateNeo\r

      \r

      pm.test(\"Returns NEO object\", () => {\r

      \    pm.expect(neo).to.not.be.null\r

      \    pm.expect(neo).to.be.an(\"object\")\r

      })\r

      \r

      pm.test(\"Object contains valid spkid\", () => {\r

      \    pm.expect(neo).to.have.property(\"spkid\")\r

      \    pm.expect(neo.spkid).to.be.a(\"string\")\r

      })\r

      \r

      pm.test(\"Input values have been updated\", () => {\r

      \    pm.expect(neo).to.have.property(\"name\")\r

      \    pm.expect(neo.name).to.equal(\"update\")\r

      })"
    language: text/javascript
order: 4498619119033333
