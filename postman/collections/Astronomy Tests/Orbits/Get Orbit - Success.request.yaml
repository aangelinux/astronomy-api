$kind: graphql-request
name: Get Orbit - Success
url: "{{URL}}"
query: |
  query Orbit {
      orbit(spkid: {{query_spkid}}) {
          spkid
          orbital_class
          eccentricity
          years
      }
  }
variables: ""
schema:
  source: auto
scripts:
  - type: afterResponse
    code: "const jsonResponse = pm.response.data\r

      const orbit = jsonResponse.orbit\r

      \r

      eval(pm.collectionVariables.get(\"status\"))\r

      eval(pm.collectionVariables.get(\"success\"))\r

      eval(pm.collectionVariables.get(\"isObject\"))\r

      eval(pm.collectionVariables.get(\"hasSpkid\"))\r

      \r

      hasStatus(200)\r

      success()\r

      isObject(orbit)\r

      hasSpkid(orbit)\r

      \r

      pm.test(\"Object contains valid orbital class\", () => {\r

      \    pm.expect(orbit).to.have.property(\"orbital_class\")\r

      \    pm.expect(orbit.orbital_class).to.be.a(\"string\")\r

      })"
    language: text/javascript
order: 1772546234038
