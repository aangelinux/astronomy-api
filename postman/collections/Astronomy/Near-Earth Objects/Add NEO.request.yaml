$kind: graphql-request
name: Add NEO
url: "{{URL}}"
query: |
  mutation AddNeo {
      addNeo(
          input: { spkid: 98, name: "postman_test", earth_moid_ld: 1.1 }
          token: {{token}}
      ) {
          spkid
          name
          earth_moid_ld
          magnitude
          rotation_hours
          pot_hazardous_asteroid
      }
  }
variables: ""
schema:
  source: auto
